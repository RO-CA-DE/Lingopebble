<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LingoPebble ULTRA FULL — Enterprise Vocabulary Arcade</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      background-color: #E5E5EA;
      color: #1C1C1E;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .ios-glass {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .ios-card {
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .ios-btn-pink {
      background-color: #FFB6C1;
      color: #1C1C1E;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ios-btn-pink:active {
      transform: scale(0.96);
      background-color: #FFA0B0;
    }

    .ios-btn-secondary {
      background-color: #F2F2F7;
      color: #1C1C1E;
      transition: all 0.15s ease;
    }
    .ios-btn-secondary:active {
      transform: scale(0.96);
      background-color: #E5E5EA;
    }

    .perspective-1000 {
      perspective: 1000px;
    }
    .transform-style-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
    }
  </style>
</head>
<body class="flex justify-center min-h-screen bg-[#E5E5EA]">

  <!-- Mobile App Frame -->
  <div class="w-full max-w-md h-screen flex flex-col justify-between relative overflow-hidden bg-[#F2F2F7] shadow-2xl">

    <!-- Header Section -->
    <header class="ios-glass sticky top-0 z-40 px-5 pt-10 pb-3 flex justify-between items-center">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-[#FFD1DC] to-[#FFB6C1] flex items-center justify-center font-bold text-base shadow-sm">
          🎯
        </div>
        <div>
          <h1 class="text-base font-extrabold tracking-tight text-black flex items-center gap-1.5">
            LingoPebble
            <span class="text-[9px] bg-red-500 text-white px-1.5 py-0.5 rounded-full font-black tracking-widest">MAX 800</span>
          </h1>
          <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider">
            Total Pool: <span id="totalVocabCount" class="text-black font-bold">100</span> Words
          </p>
        </div>
      </div>
      
      <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-50 border border-amber-200/60 shadow-sm">
        <span class="text-xs">⚡</span>
        <span id="userXP" class="text-xs font-black text-amber-600">0 XP</span>
      </div>
    </header>

    <!-- Dynamic Content Display Area -->
    <main id="appContent" class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
      <!-- JavaScript Dynamic Rendering -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="ios-glass sticky bottom-0 z-40 px-3 py-2.5 flex justify-around items-center border-t border-black/5">
      <button onclick="switchTab('arcade')" class="nav-btn flex flex-col items-center gap-0.5 text-[#FF8DA1]" data-tab="arcade">
        <i data-lucide="gamepad-2" class="w-5 h-5"></i>
        <span class="text-[9px] font-bold">게임아케이드(22)</span>
      </button>
      <button onclick="switchTab('learn')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-400" data-tab="learn">
        <i data-lucide="brain" class="w-5 h-5"></i>
        <span class="text-[9px] font-bold">암기카드</span>
      </button>
      <button onclick="switchTab('list')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-400" data-tab="list">
        <i data-lucide="database" class="w-5 h-5"></i>
        <span class="text-[9px] font-bold">전체 단어장</span>
      </button>
      <button onclick="switchTab('stats')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-400" data-tab="stats">
        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
        <span class="text-[9px] font-bold">학습리포트</span>
      </button>
    </nav>

  </div>

      ["substitute", "대체하다, 대용품", "토익"],
      ["threshold", "문턱, 기준점", "수능"],
      ["unprecedented", "전례 없는", "토익"],
      ["vague", "모호한, 희미한", "수능"],
      ["warrant", "보증하다, 영장", "토익"],
      ["aesthetic", "미학적인, 심미적인", "수능"],
      ["bizarre", "기이한, 특이한", "수능"],
      ["chronicle", "연대기, 기록하다", "수능"],
      ["dilemma", "딜레마, 진퇴양난", "중학"],
      ["eloquent", "웅변의, 유창한", "수능"],
      ["friction", "마찰, 갈등", "수능"]

    const vocabularyDB = rawVocabulary.map((item, idx) => ({
      id: idx + 1,
      word: item[0],
      meaning: item[1],
      cat: item[2],
      status: 0,
      bookmarked: false
    }));

    // =========================================================================
    // 2. 22가지 아케이드 게임 모드 데이터 설정
    // =========================================================================
    const gameModes = [
      { id: 1, name: "4지선다 스피드 퀴즈", icon: "🎯", desc: "4개 선택지 중 올바른 뜻 찾기", xp: 10 },
      { id: 2, name: "주관식 타이핑 마스터", icon: "⌨️", desc: "뜻을 보고 철자 전체를 직접 입력", xp: 20 },
      { id: 3, name: "초성 / 첫 글자 힌트", icon: "💡", desc: "첫 글자를 보고 스펠링 맞추기", xp: 15 },
      { id: 4, name: "스펠링 재배열 (Anagram)", icon: "🧩", desc: "뒤죽박죽 글자를 바르게 배치", xp: 15 },

      { id: 6, name: "3초 타임어택 O/X", icon: "⏱️", desc: "제한시간 내 뜻의 일치여부 판단", xp: 25 },
      { id: 7, name: "O / X 진위 판정 게임", icon: "⭕", desc: "단어와 뜻이 일치하는지 O/X 선택", xp: 10 },
      { id: 8, name: "빈칸 채우기 퀴즈", icon: "✍️", desc: "중간에 숨겨진 글자 맞추기", xp: 10 },
      { id: 9, name: "영단어 길이 비교", icon: "📏", desc: "제시된 두 단어 중 긴 단어 선택", xp: 5 },
      { id: 10, name: "10연승 서바이벌", icon: "🔥", desc: "한 번도 틀리지 않고 10문제 돌파", xp: 50 },
      { id: 11, name: "단어 미러링 반사판", icon: "🪞", desc: "거울처럼 뒤집힌 글자를 해석", xp: 20 },
      { id: 12, name: "슬로우 사운드 청음(0.7x)", icon: "🐌", desc: "느리게 재생되는 소리 듣고 작성", xp: 15 },
      { id: 13, name: "패스트 사운드 청음(1.5x)", icon: "⚡", desc: "빠르게 지나가는 소리 듣고 작성", xp: 25 },
      { id: 14, name: "짝짓기 매칭 테스트", icon: "🔗", desc: "단어와 매칭되는 뜻 선택하기", xp: 15 },
      { id: 15, name: "카테고리 분류하기", icon: "📊", desc: "단어의 난이도 카테고리 맞추기", xp: 10 },

    // =========================================================================
    // 3. 글로벌 상태 관리
    // =========================================================================
    let userXP = parseInt(localStorage.getItem('lingo_ultra_xp')) || 0;
    let streakCount = parseInt(localStorage.getItem('lingo_ultra_streak')) || 1;
    let currentTab = 'arcade';
    let cardIndex = 0;
    let selectedGameMode = 1;

    function saveUserData() {
      localStorage.setItem('lingo_ultra_xp', userXP);
      localStorage.setItem('lingo_ultra_streak', streakCount);
      document.getElementById('userXP').innerText = `${userXP} XP`;
    }

    function addXP(amount) {
      userXP += amount;
      saveUserData();
    }

    function speak(text, rate = 1.0) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = rate;
        speechSynthesis.speak(u);
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const isActive = btn.dataset.tab === tab;
        btn.classList.toggle('text-[#FF8DA1]', isActive);
        btn.classList.toggle('text-gray-400', !isActive);
      });
      render();
    }

    // =========================================================================
    // 4. 22가지 게임별 개별 실행 함수 핸들러
    // =========================================================================
    function runGame(modeId) {
      selectedGameMode = modeId;
      const target = vocabularyDB[Math.floor(Math.random() * vocabularyDB.length)];
      const area = document.getElementById('gameArea');
      if (!area) return;

      // MODE 1: 4지선다
      if (modeId === 1) {
        const choices = [target.meaning];
        while (choices.length < 4) {
          const r = vocabularyDB[Math.floor(Math.random() * vocabularyDB.length)].meaning;
          if (!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        area.innerHTML = `
          <div class="ios-card p-5 space-y-4">
            <div class="flex justify-between items-center text-xs text-gray-400 font-bold">
              <span>MODE #1</span>
              <span>4지선다 스피드</span>
            </div>
            <h3 class="text-3xl font-black text-center text-gray-900">${target.word}</h3>
            <div class="space-y-2">
              ${choices.map(c => `
                <button onclick="checkAnswer('${c}', '${target.meaning}', 10)" class="w-full text-left p-3.5 rounded-2xl border border-black/5 text-xs font-semibold text-gray-800 hover:bg-pink-50 transition-colors">${c}</button>
              `).join('')}
            </div>
          </div>
        `;
      }

      // MODE 2: 주관식 타이핑
      else if (modeId === 2) {
        area.innerHTML = `
          <div class="ios-card p-5 space-y-4 text-center">
            <div class="flex justify-between items-center text-xs text-gray-400 font-bold">
              <span>MODE #2</span>
              <span>주관식 타이핑</span>
            </div>
            <h3 class="text-2xl font-bold text-gray-900">${target.meaning}</h3>
            <input type="text" id="ans2" placeholder="정확한 스펠링 입력" class="w-full p-3.5 rounded-2xl bg-gray-100 text-xs font-bold text-center outline-none focus:ring-2 focus:ring-[#FFB6C1]" />
            <button onclick="checkInputAnswer('ans2', '${target.word}', 20)" class="w-full py-3.5 rounded-2xl ios-btn-pink font-bold text-xs">제출하기</button>
          </div>
        `;
      }

      // MODE 3: 초성/첫 글자
      else if (modeId === 3) {
        area.innerHTML = `
          <div class="ios-card p-5 space-y-4 text-center">
            <div class="flex justify-between items-center text-xs text-gray-400 font-bold">
              <span>MODE #3</span>
              <span>첫 글자 힌트</span>

    // =========================================================================
    // 5. 게임 답안 체크 도우미 함수들
    // =========================================================================
    function checkAnswer(selected, correct, xp) {
      if (selected === correct) {
        addXP(xp);
        alert(`🎉 정답입니다! (+${xp}XP)`);
      } else {
        alert(`❌ 틀렸습니다. 정답: ${correct}`);
      }
      runGame(selectedGameMode);
    }

    function checkInputAnswer(inputId, correct, xp) {
      const val = document.getElementById(inputId).value.trim().toLowerCase();
      if (val === correct.toLowerCase()) {
        addXP(xp);
        alert(`🎉 정답입니다! (+${xp}XP)`);
      } else {
        alert(`❌ 틀렸습니다. 정답: ${correct}`);
      }
      runGame(selectedGameMode);
    }

    function checkCharAnswer(inputId, correct, xp) {
      const val = document.getElementById(inputId).value.trim().toLowerCase();
      if (val === correct.toLowerCase()) {
        addXP(xp);
        alert(`🎉 정답입니다! (+${xp}XP)`);
      } else {
        alert(`❌ 틀렸습니다. 정답 알파벳: ${correct}`);
      }
      runGame(selectedGameMode);
    }

    function checkOX(isCorrect, userChoice, xp) {
      if (isCorrect === userChoice) {
        addXP(xp);
        alert(`🎉 정답입니다! (+${xp}XP)`);
      } else {
        alert(`❌ 틀렸습니다!`);
      }
      runGame(selectedGameMode);
    }

    function checkLengthChoice(choseFirst, targetIsLonger, xp) {
      if ((choseFirst && targetIsLonger) || (!choseFirst && !targetIsLonger)) {
        addXP(xp);
        alert(`🎉 정답입니다! (+${xp}XP)`);
      } else {
        alert(`❌ 틀렸습니다!`);
      }
      runGame(selectedGameMode);
    }
