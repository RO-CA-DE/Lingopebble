<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LingoPebble Pro — Enterprise Vocabulary System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      background-color: #F2F2F7;
      color: #1C1C1E;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .ios-glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .ios-card {
      background: #FFFFFF;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .ios-btn-pink {
      background-color: #FFB6C1;
      color: #1C1C1E;
      transition: all 0.15s ease;
    }
    .ios-btn-pink:active {
      transform: scale(0.96);
      background-color: #FFA0B0;
    }

    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }

    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="flex justify-center min-h-screen bg-[#E5E5EA]">

  <div class="w-full max-w-md h-screen flex flex-col justify-between relative overflow-hidden bg-[#F2F2F7] shadow-2xl">

    <!-- Header -->
    <header class="ios-glass sticky top-0 z-40 px-5 pt-10 pb-3 flex justify-between items-center">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-[#FFD1DC] to-[#FFB6C1] flex items-center justify-center font-bold text-sm shadow-sm">
          ✨
        </div>
        <div>
          <h1 class="text-base font-bold tracking-tight text-black">LingoPebble <span class="text-[10px] bg-[#FFB6C1] px-1.5 py-0.5 rounded-full text-black font-extrabold">PRO</span></h1>
          <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider">Level <span id="userLevel">1</span> Master</p>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1 px-2.5 py-1 rounded-full bg-amber-50 border border-amber-200">
          <span class="text-xs">⚡</span>
          <span id="userXP" class="text-xs font-bold text-amber-600">0 XP</span>
        </div>
      </div>
    </header>

    <!-- Main Dynamic Area -->
    <main id="appContent" class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
      <!-- Dynamic Content -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="ios-glass sticky bottom-0 z-40 px-4 py-2.5 flex justify-around items-center border-t border-black/5">
      <button onclick="switchTab('learn')" class="nav-btn flex flex-col items-center gap-1 text-[#FF8DA1]" data-tab="learn">
        <i data-lucide="brain" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold">암기학습</span>
      </button>
      <button onclick="switchTab('arcade')" class="nav-btn flex flex-col items-center gap-1 text-gray-400" data-tab="arcade">
        <i data-lucide="gamepad-2" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold">아케이드</span>
      </button>
      <button onclick="switchTab('list')" class="nav-btn flex flex-col items-center gap-1 text-gray-400" data-tab="list">
        <i data-lucide="search" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold">단어검색/관리</span>
      </button>
      <button onclick="switchTab('stats')" class="nav-btn flex flex-col items-center gap-1 text-gray-400" data-tab="stats">
        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold">학습리포트</span>
      </button>
    </nav>

  </div>

  <script>
    // --- 1. 기업급 대용량 영단어 데이터베이스 ---
    const initialVocabulary = [
      { id: 1, word: "abandon", meaning: "버리다, 포기하다", cat: "중학", status: 0 },
      { id: 2, word: "brilliant", meaning: "훌륭한, 명석한", cat: "중학", status: 0 },
      { id: 3, word: "candidate", meaning: "후보자, 지원자", cat: "수능", status: 0 },
      { id: 4, word: "delight", meaning: "기쁨, 즐겁게 하다", cat: "중학", status: 0 },
      { id: 5, word: "eager", meaning: "열심인, 간절히 바라는", cat: "중학", status: 0 },
      { id: 6, word: "frequently", meaning: "자주, 흔히", cat: "중학", status: 0 },
      { id: 7, word: "generous", meaning: "관대한, 후한", cat: "수능", status: 0 },
      { id: 8, word: "hesitate", meaning: "망설이다, 주저하다", cat: "수능", status: 0 },
      { id: 9, word: "innocent", meaning: "무죄의, 순진한", cat: "중학", status: 0 },
      { id: 10, word: "journey", meaning: "여행, 여정", cat: "중학", status: 0 },
      { id: 11, word: "accomplish", meaning: "성취하다, 완수하다", cat: "수능", status: 0 },
      { id: 12, word: "benchmark", meaning: "기준, 벤치마크", cat: "토익", status: 0 },
      { id: 13, word: "collaborate", meaning: "협력하다, 공동 작업하다", cat: "토익", status: 0 },
      { id: 14, word: "designate", meaning: "지정하다, 지명하다", cat: "토익", status: 0 },
      { id: 15, word: "efficient", meaning: "효율적인, 능률적인", cat: "토익", status: 0 },
      { id: 16, word: "fluctuate", meaning: "변동하다, 오르내리다", cat: "토익", status: 0 },
      { id: 17, word: "guarantee", meaning: "보장하다, 보증", cat: "토익", status: 0 },
      { id: 18, word: "implement", meaning: "실행하다, 이행하다", cat: "토익", status: 0 },
      { id: 19, word: "negotiate", meaning: "협상하다, 절충하다", cat: "토익", status: 0 },
      { id: 20, word: "optimize", meaning: "최적화하다", cat: "토익", status: 0 }
    ];

    let vocabularyDB = JSON.parse(localStorage.getItem('lingo_pro_vocab')) || initialVocabulary;
    let userStats = JSON.parse(localStorage.getItem('lingo_pro_stats')) || { xp: 0, level: 1, correctCount: 0 };

    let currentTab = 'learn';
    let cardIndex = 0;
    let selectedCat = '전체';
    let searchQuery = '';

    function saveData() {
      localStorage.setItem('lingo_pro_vocab', JSON.stringify(vocabularyDB));
      localStorage.setItem('lingo_pro_stats', JSON.stringify(userStats));
      updateStatsUI();
    }

    function addXP(amount) {
      userStats.xp += amount;
      userStats.level = Math.floor(userStats.xp / 100) + 1;
      saveData();
    }

    function updateStatsUI() {
      document.getElementById('userXP').innerText = `${userStats.xp} XP`;
      document.getElementById('userLevel').innerText = userStats.level;
    }

    function speakWord(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        speechSynthesis.speak(utterance);
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const isActive = btn.dataset.tab === tab;
        btn.classList.toggle('text-[#FF8DA1]', isActive);
        btn.classList.toggle('text-gray-400', !isActive);
      });
      render();
    }

    function setStatus(id, newStatus) {
      const target = vocabularyDB.find(v => v.id === id);
      if (target) {
        target.status = newStatus;
        if (newStatus === 2) {
          addXP(15);
          userStats.correctCount++;
        }
        saveData();
        render();
      }
    }

    function addNewWord() {
      const word = prompt("영어 단어를 입력하세요:");
      if (!word) return;
      const meaning = prompt("뜻을 입력하세요:");
      if (!meaning) return;

      const newObj = {
        id: Date.now(),
        word: word.trim(),
        meaning: meaning.trim(),
        cat: "사용자",
        status: 0
      };

      vocabularyDB.unshift(newObj);
      saveData();
      alert("✨ 단어가 성공적으로 추가되었습니다!");
      render();
    }

    // --- Main Render Engine ---
    function render() {
      updateStatsUI();
      const app = document.getElementById('appContent');

      // 1. FLASHCARD TAB
      if (currentTab === 'learn') {
        const filtered = selectedCat === '전체' 
          ? vocabularyDB 
          : vocabularyDB.filter(v => v.cat === selectedCat);

        if (filtered.length === 0) {
          app.innerHTML = `<div class="text-center py-10 text-gray-400 text-xs">해당 카테고리에 단어가 없습니다.</div>`;
          return;
        }

        if (cardIndex >= filtered.length) cardIndex = 0;
        const item = filtered[cardIndex];

        app.innerHTML = `
          <!-- Category Selector -->
          <div class="flex gap-1.5 overflow-x-auto pb-1 text-xs font-bold">
            ${['전체', '중학', '수능', '토익', '사용자'].map(cat => `
              <button onclick="selectedCat='${cat}'; cardIndex=0; render();" class="px-3 py-1.5 rounded-xl whitespace-nowrap transition-all ${selectedCat === cat ? 'bg-black text-white shadow-sm' : 'bg-gray-200/70 text-gray-500'}">${cat}</button>
            `).join('')}
          </div>

          <div class="flex items-center justify-between text-xs text-gray-400 px-1 pt-2">
            <span>진도율 (${selectedCat})</span>
            <span class="font-bold text-gray-700">${cardIndex + 1} / ${filtered.length}</span>
          </div>

          <!-- Flashcard Frame -->
          <div class="perspective-1000 w-full h-72 my-2 cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('rotate-y-180')">
            <div class="card-inner transform-style-3d transition-transform duration-500 w-full h-full relative">
              
              <!-- Front -->
              <div class="backface-hidden ios-card absolute inset-0 flex flex-col justify-between p-7 text-center items-center">
                <div class="flex justify-between w-full items-center">
                  <span class="text-[10px] px-2.5 py-1 rounded-full font-bold bg-gray-100 text-gray-500">${item.cat}</span>
                  <button onclick="event.stopPropagation(); speakWord('${item.word}')" class="p-2 rounded-full bg-gray-100 text-gray-600 hover:bg-[#FFD1DC]">
                    <i data-lucide="volume-2" class="w-4 h-4"></i>
                  </button>
                </div>
                <h3 class="text-3xl font-extrabold text-gray-900 tracking-tight">${item.word}</h3>
                <p class="text-[11px] text-gray-400">카드를 터치해서 뜻 확인 ↺</p>
              </div>

              <!-- Back -->
              <div class="rotate-y-180 backface-hidden ios-card absolute inset-0 flex flex-col justify-between p-7 text-center items-center bg-[#FFF9FA]">
                <span class="text-[10px] font-bold text-[#FF8DA1] uppercase tracking-widest">Meaning</span>
                <h3 class="text-2xl font-bold text-gray-800">${item.meaning}</h3>
                <p class="text-[11px] text-gray-400">카드를 터치해서 영단어 확인 ↺</p>
              </div>

            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button onclick="setStatus(${item.id}, 0); cardIndex=(cardIndex+1)%${filtered.length}; render();" class="py-3.5 rounded-2xl bg-gray-200 text-gray-700 font-bold text-xs active:scale-95 transition-transform">복습 필요 ❌</button>
            <button onclick="setStatus(${item.id}, 2); cardIndex=(cardIndex+1)%${filtered.length}; render();" class="py-3.5 rounded-2xl ios-btn-pink font-bold text-xs shadow-sm">완벽 암기 ⭕ (+15XP)</button>
          </div>
        `;
      }

      // 2. ARCADE TAB
      else if (currentTab === 'arcade') {
        app.innerHTML = `
          <div class="space-y-3">
            <h2 class="text-lg font-bold text-gray-900 px-1">실전 검증 미니게임 아케이드 🎮</h2>
            
            <div onclick="startChoiceGame()" class="ios-card p-4 flex items-center justify-between cursor-pointer active:scale-98 transition-all">
              <div class="flex items-center gap-3.5">
                <div class="w-10 h-10 rounded-2xl bg-[#FFD1DC]/50 flex items-center justify-center text-lg">🎯</div>
                <div>
                  <h3 class="font-bold text-gray-800 text-xs">5지선다 스피드 테스트</h3>
                  <p class="text-[10px] text-gray-400">순발력 있게 뜻 고르기</p>
                </div>
              </div>
              <span class="text-xs font-bold text-amber-500">+10XP</span>
            </div>

            <div onclick="startTypingGame()" class="ios-card p-4 flex items-center justify-between cursor-pointer active:scale-98 transition-all">
              <div class="flex items-center gap-3.5">
                <div class="w-10 h-10 rounded-2xl bg-purple-100 flex items-center justify-center text-lg">⌨️</div>
                <div>
                  <h3 class="font-bold text-gray-800 text-xs">주관식 타이핑 마스터</h3>
                  <p class="text-[10px] text-gray-400">철자를 철저하게 암기</p>
                </div>
              </div>
              <span class="text-xs font-bold text-amber-500">+20XP</span>
            </div>
          </div>
          <div id="gamePlayArea" class="mt-4"></div>
        `;
      }

      // 3. SEARCH & MANAGEMENT TAB
      else if (currentTab === 'list') {
        const searched = vocabularyDB.filter(v => 
          v.word.toLowerCase().includes(searchQuery.toLowerCase()) || 
          v.meaning.includes(searchQuery)
        );

        app.innerHTML = `
          <div class="space-y-3">
            <div class="flex justify-between items-center px-1">
              <h2 class="text-lg font-bold text-gray-900">단어 검색 & 추가</h2>
              <button onclick="addNewWord()" class="px-3 py-1.5 rounded-xl ios-btn-pink font-bold text-xs flex items-center gap-1 shadow-sm">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> 단어 추가
              </button>
            </div>

            <div class="relative">
              <input type="text" oninput="searchQuery=this.value; render();" value="${searchQuery}" placeholder="영단어 또는 뜻으로 검색..." class="w-full p-3 pl-9 rounded-2xl bg-white border border-black/5 text-xs font-semibold outline-none focus:ring-2 focus:ring-[#FFB6C1]" />
              <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-3.5"></i>
            </div>

            <div class="space-y-2 max-h-96 overflow-y-auto">
              ${searched.map(v => `
                <div class="ios-card p-3.5 flex justify-between items-center">
                  <div>
                    <div class="flex items-center gap-2">
                      <span class="font-bold text-gray-900">${v.word}</span>
                      <span class="text-[9px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">${v.cat}</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-0.5">${v.meaning}</p>
                  </div>
                  <button onclick="setStatus(${v.id}, ${(v.status + 1) % 3})" class="text-[10px] px-2.5 py-1 rounded-full font-bold ${v.status === 2 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'}">
                    ${v.status === 2 ? '완료' : '미완'}
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // 4. STATS REPORT TAB
      else if (currentTab === 'stats') {
        const memorized = vocabularyDB.filter(v => v.status === 2).length;
        const rate = Math.round((memorized / vocabularyDB.length) * 100) || 0;

        app.innerHTML = `
          <div class="space-y-4">
            <h2 class="text-lg font-bold text-gray-900 px-1">실시간 학습 분석 리포트 📊</h2>

            <div class="ios-card p-5 space-y-3">
              <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">전체 암기 달성률</p>
              <div class="flex items-baseline gap-2">
                <span class="text-3xl font-extrabold text-gray-900">${rate}%</span>
                <span class="text-xs text-gray-400">(${memorized} / ${vocabularyDB.length}개 완료)</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                <div class="bg-[#FFB6C1] h-2 transition-all duration-500" style="width: ${rate}%"></div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="ios-card p-4 text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">누적 경험치</p>
                <p class="text-xl font-extrabold text-amber-500 mt-1">${userStats.xp} XP</p>
              </div>
              <div class="ios-card p-4 text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">현재 마스터 레벨</p>
                <p class="text-xl font-extrabold text-[#FF8DA1] mt-1">Lv. ${userStats.level}</p>
              </div>
            </div>
          </div>
        `;
      }

      lucide.createIcons();
    }

    // --- Arcade Game Handlers ---
    function startChoiceGame() {
      const target = vocabularyDB[Math.floor(Math.random() * vocabularyDB.length)];
      const choices = [target.meaning];
      while (choices.length < 4) {
        const rand = vocabularyDB[Math.floor(Math.random() * vocabularyDB.length)].meaning;
        if (!choices.includes(rand)) choices.push(rand);
      }
      choices.sort(() => Math.random() - 0.5);

      const area = document.getElementById('gamePlayArea');
      area.innerHTML = `
        <div class="ios-card p-5 space-y-4">
          <h3 class="text-2xl font-extrabold text-center text-gray-900">${target.word}</h3>
          <div class="space-y-2">
            ${choices.map(c => `
              <button onclick="checkGameChoice('${c}', '${target.meaning}', ${target.id})" class="w-full text-left p-3.5 rounded-xl border border-gray-100 text-xs font-semibold text-gray-700 hover:bg-[#FFD1DC]/40">${c}</button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function checkGameChoice(selected, correct, id) {
      if (selected === correct) {
        alert("🎉 정답입니다! (+10XP)");
        setStatus(id, 2);
      } else {
        alert(`❌ 틀렸습니다. 정답: ${correct}`);
      }
      startChoiceGame();
    }

    function startTypingGame() {
      const target = vocabularyDB[Math.floor(Math.random() * vocabularyDB.length)];
      const area = document.getElementById('gamePlayArea');
      area.innerHTML = `
        <div class="ios-card p-5 space-y-4 text-center">
          <h3 class="text-xl font-bold text-gray-800">${target.meaning}</h3>
          <input type="text" id="typeAnswer" placeholder="스펠링 입력" class="w-full p-3 rounded-xl bg-gray-100 text-xs font-semibold text-center outline-none focus:ring-2 focus:ring-[#FFB6C1]" />
          <button onclick="checkTypingGame('${target.word}', ${target.id})" class="w-full py-3 rounded-xl ios-btn-pink font-bold text-xs">확인</button>
        </div>
      `;
    }

    function checkTypingGame(correct, id) {
      const val = document.getElementById('typeAnswer').value.trim().toLowerCase();
      if (val === correct.toLowerCase()) {
        alert("🎉 정답입니다! (+20XP)");
        setStatus(id, 2);
      } else {
        alert(`❌ 틀렸습니다. 정답: ${correct}`);
      }
      startTypingGame();
    }

    render();
  </script>
</body>
</html>
